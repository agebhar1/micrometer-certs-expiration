---
name: CI
permissions: {}

on: [ push ]
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        javaVersion: [ 11, 17, 21 ]
        javaDistribution: [ "temurin", "zulu" ]
    name: Java ${{ matrix.javaVersion }}-${{ matrix.javaDistribution }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: ${{ matrix.javaDistribution }}
          java-version: ${{ matrix.javaVersion }}
          cache: 'maven'
      - name: Verify with Maven
        if: ${{ matrix.javaVersion >= 17 }}
        run: mvn verify --no-transfer-progress -Drevision=0.1.0 -Dchangelist=-SNAPSHOT
      - name: Verify with Maven
        if: ${{ matrix.javaVersion < 17 }}
        run: mvn verify --no-transfer-progress -Drevision=0.1.0 -Dchangelist=-SNAPSHOT --projects -:micrometer-certs-expiration-samples-spring-boot3,-:micrometer-certs-expiration-samples-spring-boot4,-:micrometer-certs-expiration-samples-micronaut4,-:micrometer-certs-expiration-samples-quarkus3
